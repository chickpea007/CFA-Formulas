<!--
  SCRIPT LOAD ORDER MATTERS:
  1) registry.js       -> defines LEVELS, SUBJECTS, and the empty DATA object
  2) data/*.js         -> each one adds its formulas into DATA (one file per level+subject)
  3) app.js            -> the engine/router, must load LAST since it reads DATA

  To add a new subject later: drop a new data/*.js file, add ONE <script> line
  for it below (before app.js), and you're done. Nothing else changes.
-->
<script src="registry.js"></script>
<script src="data/l2-fra.js"></script>
<script src="app.js"></script>
